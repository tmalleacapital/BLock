[phases.setup]
nixPkgs = ["python3"]
aptPkgs = ["python3-pip", "python3-venv", "libglib2.0-0", "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1", "libasound2"]

[phases.install]
cmds = [
  "pip3 install -r requirements.txt --break-system-packages",
  "python3 -m playwright install chromium",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"

[phases.setup]
aptPkgs = ["python3", "python3-pip", "python3-venv", "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1", "libasound2", "libpango-1.0-0", "libcairo2", "libx11-6", "libx11-xcb1", "libxcb1", "libxext6", "fonts-liberation"]

[phases.install]
cmds = [
  "pip3 install -r requirements.txt --break-system-packages",
  "python3 -m playwright install chromium",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
